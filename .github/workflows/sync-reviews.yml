name: Sync Google Reviews

on:
  schedule:
    - cron: '0 */4 * * *'  # Chạy mỗi 4 tiếng
  workflow_dispatch:        # Chạy thủ công trên GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright + Chromium deps
        run: |
          sudo npx playwright install-deps chromium
          npx playwright install chromium

      - name: Run sync
        run: node sync-new.js

      - name: Commit updated reviews.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reviews.json
          git diff --staged --quiet || git commit -m "chore: sync reviews $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
